devices:
  CSR1kv:
    os: iosxe
    type: router
    platform: csr1000v
    credentials:
      default:
        username: cisco
        password: cisco123!
    connections:
      cli:
        protocol: ssh
        ip: 192.168.56.101
        port: 22
        command: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o KexAlgorithms=diffie-hellman-group14-sha1 cisco@192.168.56.101"
        arguments:
          learn_hostname: true
          init_exec_commands: []
          init_config_commands: []
        settings:
          PROMPT_RECOVERY: true
          GRACEFUL_DISCONNECT_WAIT_SEC: 0
